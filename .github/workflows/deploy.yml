name: deploy-book

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  MYSTMD_VERSION: "1.8.3"
  BASE_URL: /${{ github.event.repository.name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Build docs with MyST
        working-directory: docs
        run: |
          npx --yes mystmd@${MYSTMD_VERSION} --version
          npx --yes mystmd@${MYSTMD_VERSION} build --html --ci
          if [ -d "_build/html" ]; then
            echo "DOCS_OUTPUT=_build/html" >> "$GITHUB_ENV"
          else
            echo "Build output not found at _build/html. Checking directory structure..."
            find _build -type d -maxdepth 2 2>/dev/null || echo "No _build directory found"
            ls -la . || echo "Could not list directory"
            exit 1
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/${{ env.DOCS_OUTPUT }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
