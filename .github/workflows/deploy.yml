name: deploy-book

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  MYSTMD_VERSION: "1.8.3"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Build docs with MyST
        working-directory: docs
        run: |
          npx --yes mystmd@${MYSTMD_VERSION} --version
          npx --yes mystmd@${MYSTMD_VERSION} build --html --ci

      - name: Deploy to MyST
        working-directory: docs
        run: |
          npx --yes mystmd@${MYSTMD_VERSION} deploy --yes
