name: Deploy Docs (MyST) to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/pages.yaml"
  workflow_dispatch:

env:
  MYSTMD_VERSION: "1.8.3"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build docs with MyST
        working-directory: docs
        env:
          BASE_URL: /${{ github.event.repository.name }}
        run: |
          npx --yes mystmd@${MYSTMD_VERSION} --version
          npx --yes mystmd@${MYSTMD_VERSION} build --html --ci
          if [ -d "_build/html" ]; then
            echo "DOCS_OUTPUT=_build/html" >> "$GITHUB_ENV"
          elif [ -d "_build/site" ]; then
            echo "DOCS_OUTPUT=_build/site" >> "$GITHUB_ENV"
          else
            echo "Could not find MyST HTML output directory under docs/_build"
            find _build -maxdepth 3 -type d || true
            exit 1
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/${{ env.DOCS_OUTPUT }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
